<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Math Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        .question {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        input[type="text"] {
            width: 250px;
            padding: 5px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>Online Math Test</h1>

    <!-- Start of Math Test -->

    <form>

        <label for="studentName"><strong>Name:</strong></label><br>
        <input type="text" id="studentName" name="studentName" placeholder="Enter your name">

        <hr>

        <div class="question">
            <p><strong>1. What is 8 + 5?</strong></p>

            <input type="radio" id="q1a" name="q1" value="10">
            <label for="q1a">10</label><br>

            <input type="radio" id="q1b" name="q1" value="13">
            <label for="q1b">13</label><br>

            <input type="radio" id="q1c" name="q1" value="15">
            <label for="q1c">15</label>
        </div>

        <div class="question">
            <p><strong>2. What is 9 × 4?</strong></p>

            <input type="radio" id="q2a" name="q2" value="32">
            <label for="q2a">32</label><br>

            <input type="radio" id="q2b" name="q2" value="36">
            <label for="q2b">36</label><br>

            <input type="radio" id="q2c" name="q2" value="40">
            <label for="q2c">40</label>
        </div>

        <div class="question">
            <p><strong>3. Which symbol means "greater than"?</strong></p>

            <input type="radio" id="q3a" name="q3" value="<">
            <label for="q3a">&lt;</label><br>

            <input type="radio" id="q3b" name="q3" value=">">
            <label for="q3b">&gt;</label><br>

            <input type="radio" id="q3c" name="q3" value="=">
            <label for="q3c">=</label>
        </div>

        <hr>

        <div class="question">
            <p><strong>Word Problem:</strong></p>

            <p>
                Sarah has 15 apples. She gives 6 apples to her friend and buys
                4 more. How many apples does she have now? Explain your answer.
            </p>

            <textarea name="wordProblem" placeholder="Type your answer here..."></textarea>
        </div>

        <hr>

        <br>

        <input type="submit" value="Submit Test">

    </form>

    <!-- End of Math Test -->

</body>
</html>
