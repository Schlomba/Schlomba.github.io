<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery: Space Exploration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #111;
            color: #fff;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
            color: #00d2ff;
        }
        .gallery-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .gallery-item {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        /* Forces uniform height while preserving the original aspect ratio */
        img {
            height: 250px;
            width: auto;
            display: block;
            border-radius: 4px;
        }
        .caption {
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            max-width: 300px;
        }
        a {
            color: #00d2ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Header displaying the category -->
    <h1>Category: Space Exploration</h1>

    <div class="gallery-container">

        <!-- Image 1: Creative Commons -->
        <div class="gallery-item">
            <img src="https://en.wikipedia.org/wiki/Andromeda_Galaxy#/media/File:Andromeda_Galaxy_2025.png" alt="Andromeda Galaxy">
            <div class="caption">
                <strong>Andromeda Galaxy</strong><br>
                By Reinhold Wittich. Used under <a href="https://creativecommons.org" target="_blank">CC BY-SA 4.0</a>.<br>
                <a href=https://en.wikipedia.org/wiki/Andromeda_Galaxy#/media/File:Andromeda_Galaxy_2025.png" target="_blank">Source Page</a>
            </div>
        </div>

        <!-- Image 2: Public Domain -->
        <div class="gallery-item">
            <img src="https://science.nasa.gov/image-detail/amf-as11-40-5875/" alt="Buzz Aldrin on the Moon">
            <div class="caption">
                <strong>Astronaut on the Moon</strong><br>
                Public Domain (NASA).<br>
                <a href="https://science.nasa.gov/image-detail/amf-as11-40-5875/" target="_blank">Source Page</a>
            </div>
        </div>

        <!-- Image 3: Public Domain -->
        <div class="gallery-item">
            <img src="https://en.wikipedia.org/wiki/James_Webb_Space_Telescope#/media/File:JWST_spacecraft_model_3.png" alt="James Web Space Telescope">
            <div class="caption">
                <strong>James Web Space Telescope</strong><br>
                Public Domain (NASA/Chris Gunn).<br>
                <a href="https://en.wikipedia.org/wiki/James_Webb_Space_Telescope#/media/File:JWST_spacecraft_model_3.png" target="_blank">Source Page</a>
            </div>
        </div>

    </div>

</body>
</html>
