<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery: Space Exploration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #111;
            color: #fff;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
            color: #00d2ff;
        }
        .gallery-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .gallery-item {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        /* Forces uniform height while preserving the original aspect ratio */
        img {
            height: 250px;
            width: auto;
            display: block;
            border-radius: 4px;
        }
        .caption {
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            max-width: 300px;
        }
        a {
            color: #00d2ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Header displaying the category -->
    <h1>Category: Space Exploration</h1>

    <div class="gallery-container">

        <!-- Image 1: Creative Commons -->
    <div class="gallery-item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Andromeda_Galaxy_%28with_h-alpha%29.jpg" alt="Andromeda Galaxy">
    <div class="caption">
        <strong>Andromeda Galaxy</strong><br>
        By Adam Evans. Used under
        <a href="https://creativecommons.org/licenses/by-sa/2.0/" target="_blank">CC BY-SA 2.0</a>.<br>
        <a href="https://commons.wikimedia.org/wiki/File:Andromeda_Galaxy_(with_h-alpha).jpg" target="_blank">Source Page</a>
    </div>
</div>

        <!-- Image 2: Public Domain -->
   <div class="gallery-item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Aldrin_Apollo_11.jpg" alt="Buzz Aldrin on the Moon">
    <div class="caption">
        <strong>Astronaut on the Moon</strong><br>
        Public Domain (NASA).<br>
        <a href="https://commons.wikimedia.org/wiki/File:Aldrin_Apollo_11.jpg" target="_blank">Source Page</a>
    </div>
</div>

        <!-- Image 3: Public Domain -->
<div class="gallery-item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/James_Webb_Space_Telescope.jpg" alt="James Webb Space Telescope">
    <div class="caption">
        <strong>James Webb Space Telescope</strong><br>
        Public Domain (NASA).<br>
        <a href="https://commons.wikimedia.org/wiki/File:James_Webb_Space_Telescope.jpg" target="_blank">Source Page</a>
    </div>
</div>

    </div>

</body>
</html>
